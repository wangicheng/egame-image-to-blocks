<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖片轉積木工具</title>
    <!-- External CDN for Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Link to your custom stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-lg shadow-xl max-w-2xl w-full text-center">
        <!-- MODIFIED: Title changed to be more specific -->
        <h1 class="text-3xl font-bold text-gray-800 mb-6">圖片轉積木工具</h1>
        
        <div id="dropArea" class="mb-6">
            <label for="imageUpload" class="custom-file-upload">
                點擊選擇圖片
            </label>
            <input type="file" id="imageUpload" accept="image/*" class="hidden">
            <p class="text-gray-600 mt-2">或將圖片拖曳到這裡</p>
            <p class="text-gray-600">或直接貼上圖片 (Ctrl+V / Cmd+V)</p>
            
            <div class="mt-6 flex flex-col sm:flex-row justify-center items-center gap-8">
                <div class="flex flex-col items-center">
                    <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">原始圖片 (80x80)</span>
                    <canvas id="imageCanvas" class="border border-gray-300 rounded-md pixelated-canvas" width="80" height="80"></canvas>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">轉換後預覽 (積木色盤)</span>
                    <canvas id="previewCanvas" class="border border-gray-300 rounded-md bg-gray-50 pixelated-canvas" width="80" height="80"></canvas>
                </div>
            </div>
            <p id="canvasMessage" class="text-gray-500 mt-4">圖片將縮放為 80x80 像素並在轉換後顯示預覽</p>
        </div>

        <div class="mb-6 bg-gray-50 p-4 rounded-lg border border-gray-200">
            <div class="flex justify-between items-center mb-2">
                <label for="ditherStrength" class="text-sm font-medium text-gray-700">抖動程度 (Dither Strength):</label>
                <span id="ditherStrengthValue" class="text-sm font-semibold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">0%</span>
            </div>
            <input type="range" id="ditherStrength" min="0" max="100" value="0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-500">
            <p class="text-xs text-gray-500 mt-2 text-left">調整抖動程度可控制顏色漸層的平滑度。0% 為無抖動，100% 為完整 Floyd-Steinberg 抖動。</p>
        </div>

        <div class="mb-6">
            <!-- MODIFIED: Label text is now more descriptive -->
            <label for="blocklyXmlOutput" class="block text-left text-gray-700 text-sm font-medium mb-2">產生的積木 XML:</label>
            <!-- MODIFIED: ID changed for clarity -->
            <textarea id="blocklyXmlOutput" rows="5" readonly class="w-full p-3 border border-gray-300 rounded-md bg-gray-50 text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
        </div>

        <!-- MODIFIED: Button text is more specific -->
        <button id="copyButton" class="bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-6 rounded-lg shadow-md transition duration-200 ease-in-out disabled:opacity-50 disabled:cursor-not-allowed" disabled>
            複製積木碼
        </button>

        <div id="messageBox" class="mt-4 p-3 rounded-md text-sm hidden"></div>
    </div>

    <!-- Link to your JavaScript file, 'defer' ensures it runs after the HTML is parsed -->
    <script src="script.js" defer></script>
</body>
</html>
